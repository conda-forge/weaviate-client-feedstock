schema_version: 1

context:
  name: weaviate-client
  version: "4.21.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/weaviate_client-${{ version }}.tar.gz
  sha256: 050243b07f80349bbbaa3d426ace38466a972a073eff5cff62708ae5e9287dbe

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=65
    - setuptools-scm >6.2
    - pip
  run:
    - python >=${{ python_min }}
    - httpx >=0.26.0,<0.29.0
    - validators >=0.34.0,<1.0.0
    # 1.7.0 currently is missing joserfc
    # https://github.com/conda-forge/authlib-feedstock/pull/46
    - authlib >=1.6.7,<2.0.0,!=1.7.0
    - pydantic >=2.12.0,<3.0.0
    - grpcio >=1.59.5,<1.80.0
    - protobuf >=4.21.6,<7.0.0
tests:
  - python:
      imports:
        - weaviate
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: A python native Weaviate client
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/weaviate/weaviate-python-client
  repository: https://github.com/weaviate/weaviate-python-client
  documentation: https://weaviate.io/developers/weaviate/client-libraries/python

extra:
  recipe-maintainers:
    - xylar
